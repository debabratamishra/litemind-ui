name: PR Checks

on:
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.event.pull_request.head.ref }}
  cancel-in-progress: true

jobs:
  syntax:
    name: Python syntax
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Validate Python compiles
        run: |
          python -m compileall -q app main.py || {
            echo 'Python syntax errors detected.';
            exit 1;
          }

  ruff:
    name: Ruff lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Run ruff
        run: uv run ruff check .

  ty:
    name: Ty type check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # Backend + dev groups cover the core application code that `ty` checks.
      - name: Install backend + dev dependencies
        run: uv sync --group backend --group dev

      - name: Run ty
        run: uv run ty check app/backend app/services app/core app/ingestion app/skills main.py config.py logging_config.py
