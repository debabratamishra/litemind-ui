name: Snyk Security

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  snyk:
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      SNYK_ORG: ${{ secrets.SNYK_ORG || vars.SNYK_ORG }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Snyk CLI
        if: ${{ env.SNYK_TOKEN != '' }}
        uses: snyk/actions/setup@806182742461562b67788a64410098c9d9b96adb

      - name: Set up uv
        if: ${{ env.SNYK_TOKEN != '' }}
        uses: astral-sh/setup-uv@v5

      - name: Debug environment
        if: ${{ env.SNYK_TOKEN != '' }}
        run: |
          echo "=== Snyk version ==="
          snyk version
          echo "=== Python version ==="
          python --version
          echo "=== uv version ==="
          uv --version
          echo "=== pyproject.toml exists ==="
          ls -la pyproject.toml
          echo "=== uv.lock exists ==="
          ls -la uv.lock
          echo "=== .venv exists ==="
          ls -la .venv 2>/dev/null || echo ".venv not found"
          echo "=== SNYK_ORG value ==="
          echo "$SNYK_ORG"

      - name: Sync dependencies with uv
        if: ${{ env.SNYK_TOKEN != '' }}
        run: uv sync --no-install-project

      - name: Run Snyk test
        if: ${{ env.SNYK_TOKEN != '' }}
        run: |
          ORG="$(printf '%s' "${SNYK_ORG:-}" | tr -d '[:space:]')"
          if [ -z "$ORG" ]; then
            echo "SNYK_ORG is empty. Add SNYK_ORG as repo secret or repo variable (prefer org ID), then rerun."
            exit 0
          fi

          snyk config set org="$ORG"
          snyk test --all-projects --org="$ORG" || true

      - name: Skip when token is unavailable (e.g., fork PR)
        if: ${{ env.SNYK_TOKEN == '' }}
        run: echo "SNYK_TOKEN not available. Skipping Snyk scan."
