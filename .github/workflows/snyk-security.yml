name: Snyk Security

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  snyk:
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      SNYK_ORG: ${{ secrets.SNYK_ORG }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Snyk CLI
        if: ${{ env.SNYK_TOKEN != '' }}
        uses: snyk/actions/setup@806182742461562b67788a64410098c9d9b96adb

      - name: Set up uv
        if: ${{ env.SNYK_TOKEN != '' }}
        uses: astral-sh/setup-uv@v5

      - name: Export CycloneDX SBOM from uv lockfile
        if: ${{ env.SNYK_TOKEN != '' }}
        run: uv export --preview-features sbom-export --format cyclonedx1.5 --all-groups --no-emit-project --output-file sbom.snyk.cdx.json

      - name: Run basic dependency vulnerability check (non-blocking)
        if: ${{ env.SNYK_TOKEN != '' }}
        run: |
          if [ -n "$SNYK_ORG" ]; then
            snyk sbom test --org="$SNYK_ORG" --file=sbom.snyk.cdx.json || true
          else
            snyk sbom test --file=sbom.snyk.cdx.json || true
          fi

      - name: Skip when token is unavailable (e.g., fork PR)
        if: ${{ env.SNYK_TOKEN == '' }}
        run: echo "SNYK_TOKEN not available. Skipping Snyk scan."
