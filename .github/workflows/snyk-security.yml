name: Snyk Security

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  snyk:
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Snyk CLI
        if: ${{ env.SNYK_TOKEN != '' }}
        uses: snyk/actions/setup@806182742461562b67788a64410098c9d9b96adb

      - name: Run basic dependency vulnerability check (non-blocking)
        if: ${{ env.SNYK_TOKEN != '' }}
        run: snyk test --all-projects --detection-depth=4 || true

      - name: Skip when token is unavailable (e.g., fork PR)
        if: ${{ env.SNYK_TOKEN == '' }}
        run: echo "SNYK_TOKEN not available. Skipping Snyk scan."
