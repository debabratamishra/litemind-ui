name: Snyk Security

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  snyk:
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      SNYK_ORG: ${{ secrets.SNYK_ORG || vars.SNYK_ORG }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Snyk CLI
        if: ${{ env.SNYK_TOKEN != '' }}
        uses: snyk/actions/setup@806182742461562b67788a64410098c9d9b96adb

      - name: Set up uv
        if: ${{ env.SNYK_TOKEN != '' }}
        uses: astral-sh/setup-uv@v5

      - name: Run Snyk security test
        if: ${{ env.SNYK_TOKEN != '' }}
        run: |
          ORG="$(printf '%s' "${SNYK_ORG:-}" | tr -d '[:space:]')"
          if [ -z "$ORG" ]; then
            echo "SNYK_ORG is empty. Add SNYK_ORG as repo secret or repo variable (prefer org ID), then rerun."
            exit 0
          fi

          snyk config set org="$ORG"
          snyk test --all-projects --org="$ORG" || true

      - name: Skip when token is unavailable (e.g., fork PR)
        if: ${{ env.SNYK_TOKEN == '' }}
        run: echo "SNYK_TOKEN not available. Skipping Snyk scan."
