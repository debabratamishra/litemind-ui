name: Build and Publish Docker Images

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      skip_push:
        description: 'Skip pushing to registry (build only)'
        required: false
        default: false
        type: boolean

concurrency:
  group: docker-images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  IMAGE_NAME_BACKEND: debabratamishra1/litemindui-backend
  IMAGE_NAME_FRONTEND: debabratamishra1/litemindui-frontend
  IMAGE_NAME_COMPLETE: debabratamishra1/litemindui

jobs:
  build-and-push:
    # Let the release tag drive the versioned publish, but skip the
    # intermediate automated version-bump commit on main.
    if: >
      github.event_name != 'push' ||
      startsWith(github.ref, 'refs/tags/v') ||
      !startsWith(github.event.head_commit.message || '', 'chore: bump version to ')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write

    steps:
    - name: Free up disk space
      run: |
        echo "🧹 Freeing up disk space..."
        echo "Before cleanup:"
        df -h /
        
        # Remove unnecessary large packages
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf /opt/hostedtoolcache/CodeQL
        sudo rm -rf /usr/local/share/boost
        sudo rm -rf /usr/share/swift
        
        # Clean apt cache
        sudo apt-get clean
        sudo rm -rf /var/lib/apt/lists/*
        
        # Clean Docker
        docker system prune -af --volumes || true
        
        echo "After cleanup:"
        df -h /

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # ensure tags are available for semver tagging

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver-opts: |
          image=moby/buildkit:latest

    - name: Log in to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Check Docker Hub repositories exist
      if: github.event_name != 'pull_request'
      run: |
        echo "🔍 Checking if Docker Hub repositories exist..."
        
        check_repo() {
          local repo=$1
          echo "Checking repository: $repo"
          
          response=$(curl -s -o /dev/null -w "%{http_code}" "https://hub.docker.com/v2/repositories/$repo/")
          
          if [ "$response" = "200" ]; then
            echo "✅ Repository $repo exists"
            return 0
          else
            echo "❌ Repository $repo does not exist (HTTP: $response)"
            echo ""
            echo "📋 To create repository '$repo':"
            echo "1. Go to https://hub.docker.com"
            echo "2. Click 'Create Repository'"
            echo "3. Name: ${repo#*/}"
            echo "4. Set visibility to 'Public'"
            echo "5. Click 'Create'"
            echo ""
            return 1
          fi
        }
        
        # Check both repositories
        failed=0
        check_repo "${{ env.IMAGE_NAME_BACKEND }}" || failed=1
        check_repo "${{ env.IMAGE_NAME_FRONTEND }}" || failed=1
        
        if [ $failed -eq 1 ]; then
          echo ""
          echo "❌ One or more Docker Hub repositories do not exist."
          echo "Please create them manually before running this workflow."
          echo ""
          echo "💡 Alternatively, you can create them via Docker Hub CLI:"
          echo "docker hub repo create ${{ env.IMAGE_NAME_BACKEND }} --public"
          echo "docker hub repo create ${{ env.IMAGE_NAME_FRONTEND }} --public"
          exit 1
        else
          echo ""
          echo "✅ All repositories exist and are accessible!"
        fi

    - name: Extract metadata for backend
      id: meta-backend
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.IMAGE_NAME_BACKEND }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' }}

    - name: Extract metadata for frontend
      id: meta-frontend
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.IMAGE_NAME_FRONTEND }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' }}

    - name: Debug - Show generated tags
      run: |
        echo "🏷️ Debug: Workflow context"
        echo "Event name: ${{ github.event_name }}"
        echo "Ref: ${{ github.ref }}"
        echo ""
        echo "🏷️ Backend tags to be pushed:"
        echo "${{ steps.meta-backend.outputs.tags }}"
        echo ""
        echo "🏷️ Frontend tags to be pushed:"
        echo "${{ steps.meta-frontend.outputs.tags }}"

    - name: Build and push backend image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta-backend.outputs.tags }}
        labels: ${{ steps.meta-backend.outputs.labels }}
        platforms: linux/amd64
        provenance: false
        sbom: false
        cache-from: type=gha
        cache-to: type=gha,mode=min
        build-args: |
          BUILDKIT_INLINE_CACHE=1

    - name: Clean up after backend build
      run: |
        echo "🧹 Cleaning up after backend build..."
        docker system prune -f || true
        df -h /

    - name: Build and push frontend image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.nextjs
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta-frontend.outputs.tags }}
        labels: ${{ steps.meta-frontend.outputs.labels }}
        platforms: linux/amd64
        provenance: false
        sbom: false
        cache-from: type=gha
        cache-to: type=gha,mode=min
        build-args: |
          BUILDKIT_INLINE_CACHE=1

  create-compose-release:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Extract version
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Create Docker Compose for release
      run: |
        cat > docker-compose.release.yml << 'EOF'
        # LiteMindUI - Production Docker Compose
        # Version: ${{ steps.version.outputs.VERSION }}
        
        version: '3.8'
        
        services:
          backend:
            image: ${{ env.IMAGE_NAME_BACKEND }}:${{ steps.version.outputs.VERSION }}
            container_name: litemindui-backend
            ports:
              - "8000:8000"
            volumes:
              - ${HOME}/.cache/huggingface:/root/.cache/huggingface
              - ${HOME}/.ollama:/root/.ollama
              - ./uploads:/app/uploads
              - ./chroma_db:/app/chroma_db
              - ./storage:/app/storage
              - ./logs:/app/logs
            environment:
              - OLLAMA_API_URL=http://host.docker.internal:11434
              - CHROMA_DB_PATH=/app/chroma_db
              - UPLOAD_FOLDER=/app/uploads
              - STORAGE_PATH=/app/storage
              - HF_HOME=/root/.cache/huggingface
              - OLLAMA_MODELS=/root/.ollama
              - ENVIRONMENT=production
              - LOG_LEVEL=INFO
            restart: unless-stopped
            healthcheck:
              test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
              interval: 30s
              timeout: 10s
              retries: 3
              start_period: 10s
        
          frontend:
            image: ${{ env.IMAGE_NAME_FRONTEND }}:${{ steps.version.outputs.VERSION }}
            container_name: litemindui-frontend
            ports:
              - "3000:3000"
            volumes:
              - ./logs:/app/logs
            environment:
              - NEXT_PUBLIC_API_URL=http://backend:8000
              - NODE_ENV=production
              - ENVIRONMENT=production
            restart: unless-stopped
            healthcheck:
              test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
              interval: 30s
              timeout: 10s
              retries: 3
              start_period: 10s
            depends_on:
              backend:
                condition: service_healthy
        
        networks:
          default:
            driver: bridge
        EOF

    - name: Wait for GitHub release
      env:
        GH_TOKEN: ${{ secrets.RELEASE_PAT }}
      run: |
        TAG="v${{ steps.version.outputs.VERSION }}"
        for attempt in {1..20}; do
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "✅ Release $TAG is available"
            exit 0
          fi
          echo "⏳ Waiting for release $TAG to be created..."
          sleep 15
        done

        echo "❌ Release $TAG was not created in time"
        exit 1

    - name: Upload release assets
      env:
        GH_TOKEN: ${{ secrets.RELEASE_PAT }}
      run: |
        gh release upload "v${{ steps.version.outputs.VERSION }}" \
          docker-compose.release.yml \
          --repo "${{ github.repository }}" \
          --clobber
